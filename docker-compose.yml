version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chatapp_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-chatapp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatapp_network

  redis:
    image: redis:7-alpine
    container_name: chatapp_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatapp_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatapp_app
    environment:
      # ── Individual vars your config.py requires ──────────────
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${DB_NAME:-chatapp}
      # ── Other services ───────────────────────────────────────
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      # ── Filesystem paths (absolute inside container) ─────────
      CHROMA_PERSIST_DIR: /app/app/Storage
      UPLOAD_FOLDER: /app/data
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/Storage:/app/app/Storage
      - ./data:/app/data
    networks:
      - chatapp_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  chatapp_network:
    driver: bridge